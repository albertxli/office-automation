# ============================================================================
# oa run — Example Runfile Reference
#
# This file shows ALL available options and three common usage styles.
# Run with: oa run example_runfile.toml
#           oa run example_runfile.toml --dry-run
#           oa run example_runfile.toml --check
# ============================================================================


# ── STYLE 1: data_path + filenames (most common) ────────────────────────────
#
# Set data_path once, then each job just needs the Excel filename.
# Relative paths resolve from this file's directory.
#
# data_path = "../excel_test_data"
# default_output = "runfile_output/{name}.pptx"
#
# [templates]
# t1 = "test_runfile_template_1.pptx"
#
# [[job]]
# name = "Argentina"
# template = "t1"
# data = "rpm_tracking_Argentina_(05_07).xlsx"
#
# [[job]]
# name = "Brazil"
# template = "t1"
# data = "rpm_tracking_Brazil_(05_07).xlsx"


# ── STYLE 2: Full paths, no data_path ───────────────────────────────────────
#
# Every job specifies the complete path. No shortcuts needed.
# Good for one-off runs or when files are in different locations.
#
# [[job]]
# name = "Argentina"
# template = "C:/reports/templates/market_report.pptx"
# data = "C:/data/excel/rpm_tracking_Argentina_(05_07).xlsx"
# output = "C:/reports/output/Argentina.pptx"


# ── STYLE 3: Mix — data_path for most, full path for exceptions ─────────────
#
# data_path applies to relative paths only.
# Absolute paths bypass data_path automatically.
#
# data_path = "../excel_test_data"
# default_output = "runfile_output/{name}.pptx"
#
# [templates]
# t1 = "test_runfile_template_1.pptx"
#
# [[job]]
# name = "Argentina"
# template = "t1"
# data = "rpm_tracking_Argentina_(05_07).xlsx"      # → ../excel_test_data/rpm_tracking_...
#
# [[job]]
# name = "Special_Market"
# template = "t1"
# data = "C:/other/folder/special_data.xlsx"         # absolute → data_path ignored
# output = "C:/custom/output/special_report.pptx"    # overrides default_output


# ============================================================================
# ALL AVAILABLE FIELDS
# ============================================================================

# ── Top-level options (all optional) ────────────────────────────────────────

# Prepended to relative job data paths. Omit if using full paths.
# data_path = "../excel_test_data"

# Output path template. {name} is replaced with job name. Omit to use runfile_dir/{name}.pptx.
# default_output = "runfile_output/{name}.pptx"

# Pipeline steps to run. Omit to run all 5.
# steps = ["links", "tables", "deltas", "coloring", "charts"]

# ── Template aliases (optional) ─────────────────────────────────────────────
#
# Short names for template paths. Use in job `template` field.
# If not using aliases, put the full path directly in each job's template.
#
# [templates]
# t1 = "test_runfile_template_1.pptx"
# t2 = "test_runfile_template_2.pptx"

# ── Config overrides (optional) ─────────────────────────────────────────────
#
# Same keys as `oa config`. Only specify what you want to change.
#
# [config]
# "ccst.positive_prefix" = "+"
# "ccst.symbol_removal" = "%+-"
# "ccst.positive_color" = "#33CC33"
# "ccst.negative_color" = "#ED0590"
# "ccst.neutral_color" = "#595959"
# "heatmap.color_minimum" = "#F8696B"
# "heatmap.color_midpoint" = "#FFEB84"
# "heatmap.color_maximum" = "#63BE7B"
# "delta.template_positive" = "tmpl_delta_pos"
# "delta.template_negative" = "tmpl_delta_neg"
# "delta.template_none" = "tmpl_delta_none"
# "delta.template_slide" = 1
# "links.set_manual" = true

# ── Jobs (required — at least one) ──────────────────────────────────────────
#
# Each [[job]] must have: name, template, data
# Optional: output (overrides default_output for this job)
#
# Resolution rules:
#   template: looks up [templates] alias first, falls back to literal path
#   data:     absolute path → used as-is
#             relative + data_path → data_path/data
#             relative, no data_path → resolved from runfile directory
#   output:   per-job output > default_output with {name} > runfile_dir/{name}.pptx

# ── Minimum valid runfile ───────────────────────────────────────────────────

[[job]]
name = "Argentina"
template = "test_runfile_template_1.pptx"
data = "../excel_test_data/rpm_tracking_Argentina_(05_07).xlsx"
