# Example runfile for oa — RPM 2024 Market Reports (3 markets test).
#
# Usage:
#     oa run test_runfile.toml
#     oa run test_runfile.toml -v
#
# All paths resolve relative to this file's directory.

# ---------------------------------------------------------------------------
# Output path template
#
# {name} is replaced with the job key (e.g. "argentina" -> "rpm_2024_test2_argentina.pptx")
# Can also be a directory ending in "/" (e.g. "output/")
# ---------------------------------------------------------------------------

default_output = "output/rpm_2024_test2_{name}.pptx"

# ---------------------------------------------------------------------------
# Steps to run (optional — omit to run all 5)
#
# Valid: "links", "tables", "deltas", "coloring", "charts"
# Order does not matter — pipeline always runs in fixed order.
# ---------------------------------------------------------------------------

steps = ["links", "tables", "deltas", "coloring", "charts"]

# ---------------------------------------------------------------------------
# Config overrides (optional — omit or leave empty to use defaults)
#
# Same dot-notation keys as `oa config` / `--set KEY=VALUE`.
# Only the keys you specify are overridden; the rest stay at defaults.
# Run `oa config` to see all available keys.
# ---------------------------------------------------------------------------

[config]
# --- Heatmap colors ---
# "heatmap.color_minimum"  = "#F8696B"
# "heatmap.color_midpoint" = "#FFEB84"
# "heatmap.color_maximum"  = "#63BE7B"
# "heatmap.dark_font"      = "#000000"
# "heatmap.light_font"     = "#FFFFFF"
# --- Color coding (ccst) ---
# "ccst.positive_color"  = "#33CC33"
# "ccst.negative_color"  = "#ED0590"
# "ccst.neutral_color"   = "#595959"
# "ccst.positive_prefix" = "+"
# "ccst.symbol_removal"  = "%"
# --- Delta indicator templates ---
# "delta.template_positive" = "tmpl_delta_pos"
# "delta.template_negative" = "tmpl_delta_neg"
# "delta.template_none"     = "tmpl_delta_none"
# "delta.template_slide"    = 1
# --- OLE link behavior ---
# "links.set_manual" = true

# ---------------------------------------------------------------------------
# Jobs: {template_path: {output_name = excel_path}}
#
# - Outer key  = path to the PowerPoint template
# - Inner key  = output name (used in default_output's {name} placeholder)
# - Inner value = path to the Excel data file
#                 OR a table: { data = "path", output = "custom_output.pptx" }
# ---------------------------------------------------------------------------

[jobs."quick_test_files/rpm_2024_market_report_template.pptx"]
argentina = "quick_test_files/rpm_tracking_Argentina_(05_07).xlsx"
mexico    = "quick_test_files/rpm_tracking_Mexico_(05_07).xlsx"
usa       = "quick_test_files/rpm_tracking_United_States_(05_07).xlsx"
